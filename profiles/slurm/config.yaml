# Snakemake 9 SLURM executor profile (used for both smoke and production)
# Run with:  snakemake --profile profiles/slurm  -n   (dry-run first)

executor: slurm
jobs: 40                       # cap concurrent SLURM jobs (fair-share friendly)
max-jobs-per-second: 1         # polite scheduler submission rate
restart-times: 1               # one auto-retry on transient SLURM failures
keep-going: true               # one bad batch doesn't kill the others
rerun-incomplete: true
latency-wait: 30
use-conda: true                # per-rule hhsuite runtime env (workflow/envs/hhsuite.yml)
printshellcmds: true

# Resources are mostly set per-rule in the rule itself (so tier-aware batch_msa
# can override). Defaults below catch un-annotated rules.
default-resources:
  - slurm_account=bw25c013
  - slurm_partition=cpu-single
  - mem_mb=8000
  - runtime=60
  - cpus_per_task=4
  - tmpdir="$TMPDIR"

# NB: per-rule resources for batch_msa come from the rule's `resources:` block
# (which reads tier config from config.yaml). hhblits/hhmake/pack_ffindex below
# are for smoke mode and the pack stage.
set-resources:
  hhblits:
    slurm_partition: cpu-single
    mem_mb: 16000
    runtime: 60
    cpus_per_task: 4
  hhmake:
    slurm_partition: cpu-single
    mem_mb: 4000
    runtime: 30
    cpus_per_task: 1
  pack_ffindex:
    slurm_partition: cpu-single
    mem_mb: 32000            # cstranslate over 184GB a3m ffindex spikes here
    runtime: 960             # 16h: cstranslate of 17,567 entries at ~30/min = ~10h
    cpus_per_task: 8         # cstranslate is OpenMP; -c 8 in flags matches
  integrity_check:
    slurm_partition: cpu-single
    mem_mb: 4000
    runtime: 30
    cpus_per_task: 1
