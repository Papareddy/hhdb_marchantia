# Snakemake 8 SLURM executor profile
# Run with:  snakemake --profile profiles/slurm  -n   (dry-run first)

executor: slurm
jobs: 500                      # max concurrent SLURM jobs
restart-times: 1
keep-going: true
rerun-incomplete: true
latency-wait: 30
use-conda: true                # per-rule hhsuite runtime env (workflow/envs/hhsuite.yml)
printshellcmds: true

# NOTE: snakemake 'group:' summed resource asks across all rules in the
# group, producing a single submission with cpus_per_task=160, mem=312G —
# instantly rejected by cpu-single. Removed group entirely; each rule gets
# its own SLURM job. For ~54k production jobs we'll cap concurrency via --jobs.

default-resources:
  - slurm_account=bw25c013
  - slurm_partition=cpu-single  # confirm with `sinfo -s`; placeholder
  - mem_mb=8000
  - runtime=60
  - cpus_per_task=4
  - tmpdir="$TMPDIR"

set-resources:
  hhblits:
    slurm_partition: cpu-single
    mem_mb: 16000
    runtime: 60
    cpus_per_task: 4
  pack_ffindex:
    slurm_partition: cpu-single
    mem_mb: 16000
    runtime: 240
    cpus_per_task: 4
